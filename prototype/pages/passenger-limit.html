<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySubaru — Passenger Limit</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell">

  <div class="status-bar"><span>9:41</span><span>&#9679;&#9679;&#9679; &#9681;</span></div>

  <div class="nav-bar">
    <button class="back-btn" onclick="goBack()">&#8249;</button>
    <span class="nav-title">Passenger Limit</span>
    <button class="menu-btn" onclick="openMenu()">Menu</button>
  </div>

  <div class="context-banner">
    <span>Kevin Bryant &mdash; Teen Driver</span>
    <div class="info-icon">i</div>
  </div>

  <h2 style="text-align: center; padding: 20px 16px 8px; font-size: 22px;">Passenger Limit</h2>

  <!-- Passengers Allowed -->
  <div class="section-header">Passengers Allowed (Not Counting Driver)</div>
  <div class="list-row">
    <div class="row-left">
      <div>
        <div class="row-label">No Passenger Limit</div>
        <div class="row-sublabel">Disable restriction entirely</div>
      </div>
    </div>
    <label class="toggle"><input type="checkbox"><span class="slider"></span></label>
  </div>

  <div class="list-row">
    <div class="row-left">
      <span class="row-label">Max Passengers</span>
    </div>
    <div class="stepper">
      <button class="stepper-btn minus" onclick="stepperChange('pax-count', -1)">−</button>
      <span class="stepper-value" id="pax-count">2</span>
      <button class="stepper-btn plus" onclick="stepperChange('pax-count', 1)">+</button>
    </div>
  </div>

  <!-- Alert Duration -->
  <div class="section-header">Alert Duration</div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Alert After</span></div>
    <div class="row-right">
      <span class="text-blue" style="font-weight: 600;">60 sec</span>
      <span class="chevron">&#8250;</span>
    </div>
  </div>

  <!-- Notifications -->
  <div class="section-header">Notifications</div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Notify Guardian Profile</span></div>
    <label class="toggle"><input type="checkbox" checked><span class="slider"></span></label>
  </div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Notify Teen Driver</span></div>
    <label class="toggle"><input type="checkbox"><span class="slider"></span></label>
  </div>

  <!-- Actions -->
  <div style="padding: 24px 16px 8px;">
    <button class="btn-primary" onclick="saveSetting('Passenger Limit')">Save Setting</button>
  </div>
  <div style="padding: 0 16px 24px;">
    <button class="btn-cancel" onclick="goBack()">Cancel</button>
  </div>

</div>
<script src="../js/app.js"></script>
</body>
</html>
