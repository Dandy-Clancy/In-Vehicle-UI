<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySubaru — Speed Alerts</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell">

  <div class="status-bar"><span>9:41</span><span>&#9679;&#9679;&#9679; &#9681;</span></div>

  <div class="nav-bar">
    <button class="back-btn" onclick="goBack()">&#8249;</button>
    <span class="nav-title">Speed Alerts</span>
    <button class="menu-btn" onclick="openMenu()">Menu</button>
  </div>

  <div class="context-banner">
    <span>Kevin Bryant &mdash; Teen Driver</span>
    <div class="info-icon">i</div>
  </div>

  <h2 style="text-align: center; padding: 20px 16px 8px; font-size: 22px;">Create Speed Alert</h2>

  <!-- Name -->
  <div class="form-group">
    <div class="form-label">Name This Setting</div>
    <input class="form-input" type="text" value="Speed Limiting">
  </div>

  <!-- Speed Threshold -->
  <div class="section-header">Speed Threshold</div>
  <div class="list-row">
    <div class="row-left">
      <span class="row-label">Notify me when vehicle exceeds</span>
    </div>
    <div class="row-right">
      <span class="text-blue" style="font-weight: 600;" id="speed-val">85 MPH</span>
      <span class="chevron">&#8250;</span>
    </div>
  </div>

  <div style="padding: 8px 16px 16px;">
    <input type="range" class="range-slider" min="25" max="120" value="85"
           data-display="speed-display" data-unit=" MPH"
           oninput="document.getElementById('speed-val').textContent = this.value + ' MPH'">
    <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--gray-500); margin-top: 4px;">
      <span>25 MPH</span><span>120 MPH</span>
    </div>
  </div>

  <!-- Alert Duration -->
  <div class="section-header">Alert Duration</div>
  <div class="list-row">
    <div class="row-left">
      <span class="row-label">Alert after exceeding threshold for</span>
    </div>
    <div class="row-right">
      <span class="text-blue" style="font-weight: 600;">60 sec</span>
      <span class="chevron">&#8250;</span>
    </div>
  </div>

  <!-- Notify -->
  <div class="section-header">Notify</div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Guardian Profile</span></div>
    <label class="toggle"><input type="checkbox" checked><span class="slider"></span></label>
  </div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Teen Driver (Kevin)</span></div>
    <label class="toggle"><input type="checkbox"><span class="slider"></span></label>
  </div>

  <!-- Actions -->
  <div style="padding: 24px 16px 8px;">
    <button class="btn-primary" onclick="saveSetting('Speed Alert')">Save Setting</button>
  </div>
  <div style="padding: 0 16px 24px;">
    <button class="btn-cancel" onclick="goBack()">Cancel</button>
  </div>

</div>
<script src="../js/app.js"></script>
</body>
</html>
