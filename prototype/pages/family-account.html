<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">
  <title>MySubaru — MyFamily Account</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="device-frame">
  <div class="ios-status-bar">
    <span class="time">9:41</span>
    <span class="icons"><svg viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx=".5" fill="#000" opacity=".3"/><rect x="4.5" y="2" width="3" height="10" rx=".5" fill="#000" opacity=".5"/><rect x="9" y="1" width="3" height="11" rx=".5" fill="#000" opacity=".7"/><rect x="13.5" y="0" width="3" height="12" rx=".5" fill="#000"/></svg><svg viewBox="0 0 16 12"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5.1L0 3.3C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.3l-1.8 1.8C12.6 3.4 10.4 2.4 8 2.4z" fill="#000"/><path d="M8 6.8c-1.5 0-2.8.6-3.8 1.6L2.4 6.6C3.9 5.1 5.8 4.4 8 4.4s4.1.7 5.6 2.2l-1.8 1.8C10.8 7.4 9.5 6.8 8 6.8z" fill="#000"/><circle cx="8" cy="11" r="2" fill="#000"/></svg><svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#000" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx=".5" fill="#000" opacity=".4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1" fill="#000"/></svg></span>
  </div>

  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()"><span class="arrow">&#8249;</span> Back</button>
    <div class="nav-logo"><span class="paren">((</span><span class="my">My</span><strong>Subaru</strong></div>
    <button class="nav-menu" onclick="openMenu()">Menu</button>
  </div>

  <div class="ctx-banner">
    <span>Keith Bryant</span>
    <div class="info-btn">i</div>
  </div>

  <div class="content">
    <!-- Guardian -->
    <div class="sec-hdr">MyFamily Account</div>
    <a class="row" href="#">
      <div class="row-left">
        <div class="avatar-lg avatar">K</div>
        <div class="row-text">
          <div class="row-label" style="font-weight:600;">Keith Bryant</div>
          <div class="row-sub">Guardian Profile &middot; Primary</div>
        </div>
      </div>
      <span class="chevron chevron-blue">&#8250;</span>
    </a>

    <!-- Teen Drivers -->
    <div class="sec-hdr">Teen Drivers</div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 14px 0;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="avatar">K</div>
          <div>
            <div style="font-size:16px;font-weight:600;">Kevin Bryant</div>
            <div style="font-size:13px;color:var(--gray-label);">Teen Driver &middot; Age 16 &middot; High Trust</div>
          </div>
        </div>
        <span class="badge-active">Active</span>
      </div>

      <div class="stats-row stats-row-3" style="margin:14px 14px 0;padding:12px 0;border-top:0;border-bottom:0;">
        <div>
          <div class="stat-val stat-val-green">87</div>
          <div class="stat-lbl">Weekly Score</div>
        </div>
        <div>
          <div class="stat-val stat-val-green">0</div>
          <div class="stat-lbl">Alerts</div>
        </div>
        <div>
          <div class="stat-val">5</div>
          <div class="stat-lbl">Rules</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;border-top:0.5px solid var(--gray-sep);">
        <a href="reports.html" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;font-size:15px;font-weight:600;color:var(--blue);text-decoration:none;border-right:0.5px solid var(--gray-sep);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
          Reports
        </a>
        <a href="active-settings.html" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;font-size:15px;font-weight:600;color:var(--blue);text-decoration:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-2.82 1.18V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.26.46.4.97.4 1.5V12h1.09a2 2 0 010 4h-.09c-.53 0-1.04-.14-1.5-.4z"/></svg>
          Settings
        </a>
      </div>
    </div>

    <!-- Add Driver -->
    <div class="sec-hdr">Add Driver</div>
    <a class="row" href="#">
      <div class="row-left">
        <div style="width:40px;height:40px;border-radius:50%;border:2px dashed var(--gray-placeholder);display:flex;align-items:center;justify-content:center;color:var(--gray-label);font-size:22px;font-weight:300;">+</div>
        <span class="row-label" style="color:var(--gray-label);">Add Teen Driver Profile</span>
      </div>
    </a>
  </div>

  <div class="overlay" onclick="closeMenu()"></div>
  <div class="slide-menu"><div style="padding:0 20px;"><h2 style="font-size:22px;font-weight:700;margin-bottom:20px;">Driver Alerts</h2></div></div>
  <div class="notif-toast"><div class="notif-app">MYSUBARU</div><div class="notif-title"></div><div class="notif-body"></div></div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
