<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">
  <title>MySubaru — Create Curfew</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="device-frame">
  <div class="ios-status-bar"><span class="time">9:41</span><span class="icons"><svg viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx=".5" fill="#000" opacity=".3"/><rect x="4.5" y="2" width="3" height="10" rx=".5" fill="#000" opacity=".5"/><rect x="9" y="1" width="3" height="11" rx=".5" fill="#000" opacity=".7"/><rect x="13.5" y="0" width="3" height="12" rx=".5" fill="#000"/></svg><svg viewBox="0 0 16 12"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5.1L0 3.3C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.3l-1.8 1.8C12.6 3.4 10.4 2.4 8 2.4z" fill="#000"/><circle cx="8" cy="11" r="2" fill="#000"/></svg><svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#000" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx=".5" fill="#000" opacity=".4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1" fill="#000"/></svg></span></div>

  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()"><span class="arrow">&#8249;</span></button>
    <span class="nav-center">Curfew Alerts</span>
    <button class="nav-menu">Menu</button>
  </div>

  <div class="ctx-banner"><span>Kevin Bryant &mdash; Teen Driver</span><div class="info-btn">i</div></div>

  <div class="content">
    <div class="page-title">Create Curfew Alert</div>

    <div class="field-label">Name This Setting</div>
    <input class="text-input" type="text" value="Curfew Limiting">

    <div class="sec-hdr">Curfew Window</div>
    <div class="row"><div class="row-left"><span class="row-label">Start Time</span></div><div class="row-right"><span class="row-value">11:00 PM</span><span class="chevron">&#8250;</span></div></div>
    <div class="row"><div class="row-left"><span class="row-label">End Time</span></div><div class="row-right"><span class="row-value">6:00 AM</span><span class="chevron">&#8250;</span></div></div>

    <div class="sec-hdr">Days Active</div>
    <div class="day-row">
      <button class="day-btn on">M</button>
      <button class="day-btn on">T</button>
      <button class="day-btn on">W</button>
      <button class="day-btn on">T</button>
      <button class="day-btn on">F</button>
      <button class="day-btn on">S</button>
      <button class="day-btn on">S</button>
    </div>

    <div class="sec-hdr">Notify</div>
    <div class="row"><div class="row-left"><span class="row-label">Guardian Profile</span></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label></div>
    <div class="row" style="border-bottom:none;"><div class="row-left"><span class="row-label">Teen Driver (Kevin)</span></div><label class="toggle"><input type="checkbox"><span class="toggle-track"></span></label></div>

    <div style="padding:24px 16px 8px;"><button class="btn btn-blue" onclick="saveSetting('Curfew Alert')">Save Setting</button></div>
    <div style="padding:0 16px 24px;"><button class="btn btn-text" onclick="goBack()">Cancel</button></div>
  </div>

  <div class="notif-toast"><div class="notif-app">MYSUBARU</div><div class="notif-title"></div><div class="notif-body"></div></div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
