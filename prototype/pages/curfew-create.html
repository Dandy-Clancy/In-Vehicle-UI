<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySubaru — Create Curfew Alert</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell">

  <div class="status-bar"><span>9:41</span><span>&#9679;&#9679;&#9679; &#9681;</span></div>

  <div class="nav-bar">
    <button class="back-btn" onclick="goBack()">&#8249;</button>
    <span class="nav-title">Curfew Alerts</span>
    <button class="menu-btn" onclick="openMenu()">Menu</button>
  </div>

  <div class="context-banner">
    <span>Kevin Bryant &mdash; Teen Driver</span>
    <div class="info-icon">i</div>
  </div>

  <h2 style="text-align: center; padding: 20px 16px 8px; font-size: 22px;">Create Curfew Alert</h2>

  <!-- Name -->
  <div class="form-group">
    <div class="form-label">Name This Setting</div>
    <input class="form-input" type="text" value="Curfew Limiting">
  </div>

  <!-- Curfew Window -->
  <div class="section-header">Curfew Window</div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Start Time</span></div>
    <div class="row-right">
      <span class="text-blue" style="font-weight: 600;">11:00 PM</span>
      <span class="chevron">&#8250;</span>
    </div>
  </div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">End Time</span></div>
    <div class="row-right">
      <span class="text-blue" style="font-weight: 600;">6:00 AM</span>
      <span class="chevron">&#8250;</span>
    </div>
  </div>

  <!-- Days Active -->
  <div class="section-header">Days Active</div>
  <div style="display: flex; gap: 8px; padding: 8px 16px; flex-wrap: wrap;">
    <button style="width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--blue-primary); color: white; font-weight: 600; font-size: 13px; cursor: pointer;">M</button>
    <button style="width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--blue-primary); color: white; font-weight: 600; font-size: 13px; cursor: pointer;">T</button>
    <button style="width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--blue-primary); color: white; font-weight: 600; font-size: 13px; cursor: pointer;">W</button>
    <button style="width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--blue-primary); color: white; font-weight: 600; font-size: 13px; cursor: pointer;">T</button>
    <button style="width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--blue-primary); color: white; font-weight: 600; font-size: 13px; cursor: pointer;">F</button>
    <button style="width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--blue-primary); color: white; font-weight: 600; font-size: 13px; cursor: pointer;">S</button>
    <button style="width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--blue-primary); color: white; font-weight: 600; font-size: 13px; cursor: pointer;">S</button>
  </div>

  <!-- Notify -->
  <div class="section-header">Notify</div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Guardian Profile</span></div>
    <label class="toggle"><input type="checkbox" checked><span class="slider"></span></label>
  </div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Teen Driver (Kevin)</span></div>
    <label class="toggle"><input type="checkbox"><span class="slider"></span></label>
  </div>

  <!-- Actions -->
  <div style="padding: 24px 16px 8px;">
    <button class="btn-primary" onclick="saveSetting('Curfew Alert')">Save Setting</button>
  </div>
  <div style="padding: 0 16px 24px;">
    <button class="btn-cancel" onclick="goBack()">Cancel</button>
  </div>

</div>
<script src="../js/app.js"></script>
</body>
</html>
