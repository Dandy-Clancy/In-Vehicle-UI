<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">
  <title>MySubaru — Boundary Alerts</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="device-frame">
  <div class="ios-status-bar dark"><span class="time">9:41</span><span class="icons"><svg viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx=".5" fill="#fff" opacity=".3"/><rect x="4.5" y="2" width="3" height="10" rx=".5" fill="#fff" opacity=".5"/><rect x="9" y="1" width="3" height="11" rx=".5" fill="#fff" opacity=".7"/><rect x="13.5" y="0" width="3" height="12" rx=".5" fill="#fff"/></svg><svg viewBox="0 0 16 12"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5.1L0 3.3C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.3l-1.8 1.8C12.6 3.4 10.4 2.4 8 2.4z" fill="#fff"/><circle cx="8" cy="11" r="2" fill="#fff"/></svg><svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx=".5" fill="#fff" opacity=".4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1" fill="#fff"/></svg></span></div>

  <div class="nav-bar" style="background:var(--banner-bg);">
    <button class="nav-back" onclick="goBack()" style="color:#4DA6FF;"><span class="arrow">&#8249;</span></button>
    <span class="nav-center" style="color:var(--white);">Boundary Alerts</span>
    <button class="nav-menu" style="color:#4DA6FF;">Menu</button>
  </div>

  <div class="ctx-banner"><span>Kevin Bryant &mdash; Teen Driver</span><div class="info-btn">i</div></div>

  <div class="content" style="display:flex;flex-direction:column;">
    <div class="map-area" style="flex:1;">
      <div class="map-addr">1566 Pearson St, Ferndale, MI 48220</div>
      <div class="map-circle"><div class="map-dot"></div></div>
    </div>

    <div style="background:var(--white);padding:14px 16px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div style="flex:1;display:flex;align-items:center;gap:8px;background:#F5F5FA;border-radius:10px;padding:8px 12px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <span style="color:var(--gray-label);font-size:15px;">Search address...</span>
        </div>
        <div style="display:flex;border:1px solid var(--gray-sep);border-radius:8px;overflow:hidden;">
          <button style="padding:8px 14px;background:var(--blue);color:white;border:none;font-weight:600;font-size:13px;cursor:pointer;">Circle</button>
          <button style="padding:8px 14px;background:white;border:none;font-weight:500;font-size:13px;cursor:pointer;color:var(--gray-secondary);">Square</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:14px;color:var(--gray-label);min-width:42px;">Radius</span>
        <input type="range" class="range-input" min="0.1" max="5" step="0.1" value="0.2" style="flex:1;" oninput="document.getElementById('rad').textContent=this.value+' mi'">
        <span id="rad" style="font-size:14px;min-width:42px;text-align:right;">0.2 mi</span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;background:var(--white);">
      <button class="btn btn-outline" onclick="goBack()">Cancel</button>
      <button class="btn btn-blue" onclick="saveSetting('Boundary Alert')">Next</button>
    </div>
  </div>

  <div class="notif-toast"><div class="notif-app">MYSUBARU</div><div class="notif-title"></div><div class="notif-body"></div></div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
