<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySubaru — Boundary Alerts</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell">

  <div class="status-bar status-bar-dark"><span>9:41</span><span>&#9679;&#9679;&#9679; &#9681;</span></div>

  <div class="nav-bar" style="background: var(--blue-banner);">
    <button class="back-btn" onclick="goBack()" style="color: #4DA6FF;">&#8249;</button>
    <span class="nav-title" style="color: white;">Boundary Alerts</span>
    <button class="menu-btn" style="color: #4DA6FF;">Menu</button>
  </div>

  <div class="context-banner">
    <span>Kevin Bryant &mdash; Teen Driver</span>
    <div class="info-icon">i</div>
  </div>

  <!-- Map Area -->
  <div class="map-container">
    <div class="map-address">1566 Pearson St, Ferndale, MI 48220</div>
    <div class="map-circle">
      <div class="map-pin"></div>
    </div>
  </div>

  <!-- Controls -->
  <div style="background: white; padding: 16px;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
      <div style="display: flex; align-items: center; gap: 8px; flex: 1;">
        <span class="row-icon" style="color: var(--gray-500);">&#128269;</span>
        <input class="form-input" type="text" placeholder="Search address..." style="border: none; padding: 8px 0;">
      </div>
      <div style="display: flex; border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden;">
        <button style="padding: 8px 16px; background: var(--blue-primary); color: white; border: none; font-weight: 600; cursor: pointer;">Circle</button>
        <button style="padding: 8px 16px; background: white; border: none; font-weight: 600; cursor: pointer; color: var(--gray-600);">Square</button>
      </div>
    </div>

    <div style="display: flex; align-items: center; gap: 12px;">
      <span style="font-size: 14px; color: var(--gray-500); min-width: 45px;">Radius</span>
      <input type="range" class="range-slider" min="0.1" max="5" step="0.1" value="0.2" style="flex: 1;"
             oninput="document.getElementById('radius-val').textContent = this.value + ' mi'">
      <span id="radius-val" style="font-size: 14px; min-width: 45px; text-align: right;">0.2 mi</span>
    </div>
  </div>

  <!-- Bottom Buttons -->
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; background: white;">
    <button class="btn-secondary" onclick="goBack()">Cancel</button>
    <button class="btn-primary" onclick="saveSetting('Boundary Alert')">Next</button>
  </div>

</div>
<script src="../js/app.js"></script>
</body>
</html>
