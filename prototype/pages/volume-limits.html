<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySubaru — Volume Limiting</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell">

  <div class="status-bar"><span>9:41</span><span>&#9679;&#9679;&#9679; &#9681;</span></div>

  <div class="nav-bar">
    <button class="back-btn" onclick="goBack()">&#8249;</button>
    <span class="nav-title">Volume Limiting</span>
    <button class="menu-btn" onclick="openMenu()">Menu</button>
  </div>

  <div class="context-banner">
    <span>Kevin Bryant &mdash; Teen Driver</span>
    <div class="info-icon">i</div>
  </div>

  <h2 style="text-align: center; padding: 20px 16px 8px; font-size: 22px;">Volume Limiting</h2>

  <!-- Maximum Volume -->
  <div class="section-header">Maximum Volume</div>
  <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 16px;">
    <span style="font-size: 17px;">Max Volume</span>
    <span id="vol-display" style="font-size: 24px; font-weight: 700; color: var(--blue-primary);">70%</span>
  </div>
  <div style="padding: 0 16px 8px;">
    <input type="range" class="range-slider" min="0" max="100" value="70" style="background: linear-gradient(to right, var(--blue-primary) 70%, var(--gray-200) 70%);"
           oninput="document.getElementById('vol-display').textContent = this.value + '%'; this.style.background = 'linear-gradient(to right, var(--blue-primary) ' + this.value + '%, var(--gray-200) ' + this.value + '%)'">
    <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--gray-500); margin-top: 4px;">
      <span>0%</span><span>50%</span><span>100%</span>
    </div>
  </div>

  <div class="list-row">
    <div class="row-left">
      <div>
        <div class="row-label">Lock Volume While in Motion</div>
        <div class="row-sublabel">Teen cannot adjust above cap while driving</div>
      </div>
    </div>
    <label class="toggle"><input type="checkbox" checked><span class="slider"></span></label>
  </div>

  <!-- Apply To -->
  <div class="section-header">Apply To</div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">All Audio Sources</span></div>
    <label class="toggle"><input type="checkbox" checked><span class="slider"></span></label>
  </div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Phone Calls Only</span></div>
    <label class="toggle"><input type="checkbox"><span class="slider"></span></label>
  </div>

  <!-- Notifications -->
  <div class="section-header">Notifications</div>
  <div class="list-row">
    <div class="row-left"><span class="row-label">Notify Guardian if Adjusted</span></div>
    <label class="toggle"><input type="checkbox" checked><span class="slider"></span></label>
  </div>

  <!-- Actions -->
  <div style="padding: 24px 16px 8px;">
    <button class="btn-primary" onclick="saveSetting('Volume Limiting')">Save Setting</button>
  </div>
  <div style="padding: 0 16px 24px;">
    <button class="btn-cancel" onclick="goBack()">Cancel</button>
  </div>

</div>
<script src="../js/app.js"></script>
</body>
</html>
