<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">
  <title>MySubaru — Home</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="device-frame">

  <!-- Status Bar -->
  <div class="ios-status-bar">
    <span class="time">9:41</span>
    <span class="icons">
      <svg viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="0.5" fill="#000" opacity=".3"/><rect x="4.5" y="2" width="3" height="10" rx="0.5" fill="#000" opacity=".5"/><rect x="9" y="1" width="3" height="11" rx="0.5" fill="#000" opacity=".7"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#000"/></svg>
      <svg viewBox="0 0 16 12"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5.1L0 3.3C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.3l-1.8 1.8C12.6 3.4 10.4 2.4 8 2.4z" fill="#000"/><path d="M8 6.8c-1.5 0-2.8.6-3.8 1.6L2.4 6.6C3.9 5.1 5.8 4.4 8 4.4s4.1.7 5.6 2.2l-1.8 1.8C10.8 7.4 9.5 6.8 8 6.8z" fill="#000"/><circle cx="8" cy="11" r="2" fill="#000"/></svg>
      <svg viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2" stroke="#000" stroke-width="1" fill="none"/><rect x="22" y="4" width="2" height="4" rx="0.5" fill="#000" opacity=".4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1" fill="#000"/></svg>
    </span>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <span style="min-width:60px"></span>
    <div class="nav-logo">
      <span class="paren">((</span><span class="my">My</span><strong>Subaru</strong>
    </div>
    <button class="nav-menu" onclick="openMenu()">Menu</button>
  </div>

  <!-- Context Banner -->
  <div class="ctx-banner">
    <span>My First Subaru</span>
    <div class="info-btn">i</div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Quick Start Row -->
    <div class="home-actions">
      <div class="ha-side" onclick="navigateTo('pages/settings-menu.html')">
        <div class="ha-side-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </div>
        <div class="ha-side-label">View Start<br>Settings</div>
      </div>

      <div class="ha-center">
        <div class="ha-big-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#1A3A5C" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><path d="M12 5v2M12 17v2"/></svg>
        </div>
        <div class="ha-center-label">Quick Start</div>
      </div>

      <div class="ha-side">
        <div class="ha-side-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8"><path d="M12 3c-4.97 0-9 3.13-9 7 0 2.38 1.56 4.5 4 5.7V19l3-2h2c4.97 0 9-3.13 9-7s-4.03-7-9-7z"/></svg>
        </div>
        <div class="ha-side-label">Climate<br>Presets</div>
      </div>
    </div>

    <!-- Lock / Unlock -->
    <div class="home-row" style="margin-top: 12px;">
      <div class="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <span>Lock</span>
      </div>
      <div class="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 019.9-1"/></svg>
        <span>Unlock</span>
      </div>
    </div>

    <!-- Locate / Horn / Trips -->
    <div class="home-row home-row-3">
      <div class="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Locate Vehicle</span>
      </div>
      <div class="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
        <span>Horn &amp; Lights</span>
      </div>
      <div class="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        <span>MyTrips</span>
      </div>
    </div>

  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <a class="tab active" href="index.html">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16C5.67 16 5 15.33 5 14.5S5.67 13 6.5 13 8 13.67 8 14.5 7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
      <span>Vehicle Status</span>
    </a>
    <a class="tab" href="#">
      <svg viewBox="0 0 24 24" fill="currentColor" opacity=".5"><path d="M20 6h-2.18c.11-.31.18-.65.18-1a3 3 0 00-5.2-2l-1 1-1-1a3 3 0 00-5.2 2c0 .35.07.69.18 1H4c-1.1 0-2 .9-2 2v3h20V8c0-1.1-.9-2-2-2zm-7-1a1 1 0 012 0 1 1 0 01-2 0zM9 4a1 1 0 012 0 1 1 0 01-2 0zM2 19c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-6H2v6z"/></svg>
      <span>Offers &amp; Events</span>
    </a>
    <a class="tab" href="pages/family-account.html">
      <svg viewBox="0 0 24 24" fill="currentColor" opacity=".5"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Set Driver Alerts</span>
    </a>
  </div>

  <!-- Slide-out Menu -->
  <div class="overlay" onclick="closeMenu()"></div>
  <div class="slide-menu">
    <div style="padding: 0 20px;">
      <h2 style="font-size: 22px; font-weight: 700; margin-bottom: 20px;">Driver Alerts</h2>
      <a class="row" href="pages/boundary-alerts.html" style="border-radius: 12px 12px 0 0;">
        <div class="row-left"><span class="row-icon">&#127758;</span><span class="row-label">Boundary Alerts</span></div>
        <span class="chevron">&#8250;</span>
      </a>
      <a class="row" href="pages/speed-alerts.html">
        <div class="row-left"><span class="row-icon">&#9201;</span><span class="row-label">Speed Alerts</span></div>
        <span class="chevron">&#8250;</span>
      </a>
      <a class="row" href="pages/curfew-alerts.html">
        <div class="row-left"><span class="row-icon">&#128336;</span><span class="row-label">Curfew Alerts</span></div>
        <span class="chevron">&#8250;</span>
      </a>
      <a class="row" href="#" style="border-radius: 0 0 12px 12px; border-bottom: none;">
        <div class="row-left"><span class="row-icon">&#128664;</span><span class="row-label">Valet Mode</span></div>
        <span class="chevron">&#8250;</span>
      </a>
    </div>
  </div>

  <!-- Toast -->
  <div class="notif-toast">
    <div class="notif-app">MYSUBARU</div>
    <div class="notif-title"></div>
    <div class="notif-body"></div>
  </div>

</div>
<script src="js/app.js"></script>
</body>
</html>
